<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" sizes="32x32" href="assets/Part107Prep-icon-32.png">
<link rel="apple-touch-icon" sizes="192x192" href="assets/Part107Prep-icon-192.png">
<title>Part 107 Prep — Remote Pilot Exam Trainer</title>
<style>
  :root {
    --bg: #17181c; --panel: #212329; --panel2: #2a2d35; --text: #e8e6e0;
    --dim: #aaa79f; --gold: #d4a942; --gold-dim: #b0934c;
    --good: #5dbb63; --warn: #d4a942; --bad: #e06055; --line: #34373f;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 16px/1.55 "Segoe UI", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  header { display: flex; align-items: center; gap: 14px; padding: 12px 20px; background: var(--panel); border-bottom: 2px solid var(--gold-dim); flex-wrap: wrap; }
  header h1 { display: flex; align-items: center; gap: 9px; font-size: 20px; margin: 0; color: var(--gold); letter-spacing: .5px; }
  .brandmark { width: 30px; height: 30px; border-radius: 7px; outline: 1px solid rgba(255,255,255,.1); }
  header .sub { color: var(--dim); font-size: 13px; }
  nav { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
  nav button { background: var(--panel2); }
  nav button.active { background: var(--gold); color: #1a1a1a; font-weight: 600; }
  #main { max-width: 980px; margin: 20px auto; padding: 0 16px 60px; }
  #main.wide { max-width: 1460px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 18px 22px; margin-bottom: 16px; }
  h1, h2, h3 { text-wrap: balance; }
  p { text-wrap: pretty; }
  h2 { margin: 0 0 10px; font-size: 18px; color: var(--gold); }
  h3 { font-size: 15px; margin: 18px 0 6px; color: var(--text); }
  button, .buttonlike { min-height: 44px; border: 1px solid var(--line); background: var(--panel2); color: var(--text); padding: 9px 16px; border-radius: 8px; cursor: pointer; font: inherit; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; transition-property: transform, border-color, background-color; transition-duration: 180ms; transition-timing-function: cubic-bezier(.2,0,0,1); }
  button:hover { border-color: var(--gold); }
  button:active, .buttonlike:active { transform: scale(.96); }
  button:focus-visible, .buttonlike:focus-visible, a:focus-visible { outline: 3px solid var(--gold); outline-offset: 3px; }
  .buttonlike:hover { border-color: var(--gold); }
  .sr-only { position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  button.primary { background: var(--gold); color: #1a1a1a; font-weight: 600; }
  button.danger { background: #4a2422; border-color: #6c332f; }
  .btnrow { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .bigstat { font-size: 44px; font-weight: 700; margin: 6px 0; }
  .good { color: var(--good); } .warn { color: var(--warn); } .bad { color: var(--bad); }
  table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 14px; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--line); }
  th { color: var(--dim); font-weight: 600; }
  .barrow { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
  .barlabel { flex: 0 0 300px; font-size: 14px; } .barlabel small { color: var(--dim); }
  .bar { flex: 1; height: 14px; background: var(--panel2); border-radius: 7px; overflow: hidden; }
  .fill { height: 100%; border-radius: 7px; background: var(--dim); transition: width .4s; }
  .fill.good { background: var(--good); } .fill.warn { background: var(--warn); } .fill.bad { background: var(--bad); }
  .barpct { flex: 0 0 110px; font-size: 13px; color: var(--dim); text-align: right; }
  .diag { border-color: var(--gold-dim); }
  .diag ul, .diag ol { margin: 6px 0; padding-left: 22px; } .diag li { margin: 4px 0; }
  .quizhead { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; font-size: 14px; color: var(--dim); }
  .qtext { font-size: 17px; }
  .choices-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .choice { text-align: left; padding: 12px 16px; font-size: 15px; line-height: 1.4; }
  .choice.selected { border-color: var(--gold); background: #3a3320; }
  .choice.correct { border-color: var(--good); background: #223a26; color: #d6f5d8; }
  .choice.wrong { border-color: var(--bad); background: #3a2422; color: #f5d8d5; }
  .choice:disabled { cursor: default; opacity: 1; }
  .feedback { margin-top: 14px; padding: 12px 16px; border-radius: 8px; font-size: 15px; }
  .feedback.okq { background: #223a26; } .feedback.missq { background: #3a2422; }
  .figbtn { margin: 8px 0; border-color: var(--gold-dim); }
  .grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .cell { width: 34px; height: 30px; display: flex; align-items: center; justify-content: center; background: var(--panel2); border: 1px solid var(--line); border-radius: 6px; font-size: 12px; cursor: pointer; }
  .cell.done { background: #2c3a2e; border-color: var(--good); }
  .cell.flagged { border-color: var(--warn); background: #3a3320; }
  .cell.cur { outline: 2px solid var(--gold); }
  .q-review ul.choices { list-style: none; padding: 0; }
  .q-review ul.choices li { padding: 6px 12px; margin: 4px 0; border-radius: 6px; background: var(--panel2); font-size: 14px; }
  .q-review li.correct { background: #223a26; } .q-review li.wrong { background: #3a2422; }
  .q-review.missq { border-left: 4px solid var(--bad); } .q-review.okq { border-left: 4px solid var(--good); }
  .expl { color: #cfcabf; font-size: 14px; background: var(--panel2); padding: 10px 14px; border-radius: 8px; }
  .meta { color: var(--dim); font-size: 12px; }
  .reflist li { margin: 6px 0; }
  a { color: var(--gold); }
  small { color: var(--dim); }
  #figmodal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 50; align-items: center; justify-content: center; flex-direction: column; }
  #figwrap { overflow: auto; max-width: 95vw; max-height: 88vh; border: 2px solid var(--gold-dim); border-radius: 8px; background: #fff; }
  #figimg { display: block; width: min(90vw, 900px); cursor: zoom-in; }
  #figimg.zoomed { width: 1650px; max-width: none; cursor: zoom-out; }
  #figclose { margin-top: 10px; }
  .lessonrow { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .lessonrow:hover { border-color: var(--gold); }
  .lessonstat { font-weight: 700; font-size: 15px; color: var(--dim); }
  .lesson svg { width: 100%; height: auto; background: #1c1e23; border: 1px solid var(--line); border-radius: 8px; margin: 8px 0 14px; }
  .lesson p, .lesson li { font-size: 15px; }
  .lesson code { font-family: Consolas, monospace; background: #1c1e23; border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px; font-size: 13px; color: #e8c877; white-space: nowrap; }
  .lesson table td, .lesson table th { vertical-align: top; }
  .mappicker { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0 8px; }
  .mappicker button.on { background: var(--gold); color: #1a1a1a; font-weight: 700; border-color: var(--gold); }
  .scen svg { width: 100%; height: auto; border-radius: 8px; margin: 8px 0 14px; border: 1px solid var(--line); }
  .scenwarn { background: #3a3320; border: 1px solid var(--gold-dim); border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; }
  .scengo { padding: 10px 14px; border-radius: 8px; font-weight: 600; margin: 10px 0; }
  .scengo.bad { background: #3a2422; border: 1px solid #6c332f; color: #f3d3cf; }
  .scensrc { font-size: 12px; color: var(--dim); margin-top: 8px; }
  .scensrc a { color: var(--gold-dim); }
  .eyebrow { margin: 0 0 5px; color: var(--gold); font-size: 11px !important; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
  .scenario-intro h2 { font-size: 24px; }
  .scenario-shell { display: grid; grid-template-columns: minmax(0, 1.65fr) minmax(360px, 1fr); gap: 18px; align-items: start; }
  .scenario-map, .scenario-rail > section, .scenario-rail > .scensrc { background: #1c1e23; border: 1px solid var(--line); border-radius: 10px; padding: 16px; }
  .scenario-map { position: sticky; top: 12px; }
  .scenario-map h2 { color: var(--text); font-size: 22px; }
  .lede { color: #d3d0c8; max-width: 74ch; }
  .scenario-rail { display: grid; gap: 12px; }
  .scenario-rail > section { margin: 0; }
  .briefchecks { margin: 0; padding-left: 20px; }
  .briefchecks li { margin: 7px 0; }
  .plain-note { margin-top: 12px; padding: 10px 12px; border: 1px solid var(--gold-dim); border-radius: 8px; background: #28271f; color: #ded9ca; }
  .tablewrap { overflow-x: auto; }
  .metar.compact { font-size: 14px; line-height: 1.45; overflow-wrap: anywhere; }
  .verdict { border-width: 2px !important; }
  .verdict.go { border-color: var(--good) !important; }
  .verdict.modify { border-color: var(--warn) !important; }
  .verdict.nogo { border-color: var(--bad) !important; background: #2a1e1e; }
  .verdict h2 { color: var(--text); font-size: 22px; }
  /* --- Go / No-Go builder --- */
  .gng-group { border: 1px solid var(--line); border-radius: 10px; padding: 12px 16px 4px; margin: 0 0 14px; }
  .gng-group legend { color: var(--gold); font-weight: 700; font-size: 15px; padding: 0 6px; }
  .gng-hint { color: var(--dim); font-weight: 400; font-size: 12px; }
  .gng-item { border-top: 1px solid var(--line); padding: 12px 0; display: flex; gap: 14px; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; }
  .gng-group .gng-item:first-of-type { border-top: 0; }
  .gng-q { margin: 0; flex: 1 1 380px; font-size: 14.5px; }
  .gng-tag { display: inline-block; margin-left: 6px; font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 1px 6px; border-radius: 4px; border: 1px solid var(--line); color: var(--dim); white-space: nowrap; }
  .gng-tag.stop { color: #e9a49d; border-color: #6c332f; }
  .gng-tag.caution { color: #e3cb8b; border-color: var(--gold-dim); }
  .gng-opts { display: flex; gap: 6px; flex: 0 0 auto; }
  .gng-opt { min-width: 64px; }
  .gng-opt.sel.yes { background: #223a26; border-color: var(--good); color: #d6f5d8; font-weight: 700; }
  .gng-opt.sel.no { background: #3a2422; border-color: var(--bad); color: #f5d8d5; font-weight: 700; }
  .scenario-question { border-top: 1px solid var(--line); padding-top: 14px; margin-top: 14px; }
  .scenario-question:first-of-type { border-top: 0; padding-top: 0; }
  .scenario-feedback { margin-top: 10px; padding: 12px; border-radius: 8px; }
  .scenario-feedback.okq { background: #223a26; }
  .scenario-feedback.missq { background: #3a2422; }
  .trapline { color: #f1cf80; }
  .decodehead { margin-bottom: 8px; }
  .decodegrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .decodegrid > div { border-left: 3px solid var(--gold-dim); padding-left: 10px; }
  .decodegrid b { color: var(--gold); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; }
  .decodegrid p { margin: 3px 0 0; }
  .systemhead { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .systemhead p { margin: 0; color: var(--dim); max-width: 68ch; }
  .statuspill { display: inline-flex; align-items: center; min-height: 24px; padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 800; letter-spacing: .04em; font-variant-numeric: tabular-nums; }
  .statuspill.ok { background: #223a26; color: #b9edbd; }
  .statuspill.fail { background: #4a2422; color: #ffd2ce; }
  .statuspill.info { background: #203348; color: #b8dafa; }
  .dependencystrip { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 1px; margin: 20px 0; background: var(--line); border-radius: 10px; overflow: hidden; box-shadow: 0 10px 26px rgba(0,0,0,.16); }
  .dependencystrip > div { display: grid; grid-template-columns: 1fr auto; gap: 7px 10px; align-items: center; padding: 14px; background: var(--panel2); }
  .dependencystrip small { grid-column: 1 / -1; color: var(--dim); line-height: 1.35; }
  .dependencytable { font-size: 13px; font-variant-numeric: tabular-nums; }
  .dependencytable th { width: 190px; color: var(--text); }
  .dependencytable td { overflow-wrap: anywhere; color: #cfcabf; }
  .systemnote { margin-top: 18px; padding: 12px 14px; border: 1px solid var(--line); border-radius: 8px; background: #1c1e23; color: #cfccc4; }
  .systemnote code { color: var(--gold); }
  .spotrow { display: flex; gap: 14px; flex-wrap: wrap; }
  .spotfig { margin: 10px 0; flex: 1 1 260px; max-width: 460px; }
  .spotfig img { width: 100%; border-radius: 8px; border: 2px solid var(--gold-dim); cursor: zoom-in; display: block; }
  .spotfig figcaption { font-size: 13px; color: var(--dim); margin-top: 6px; line-height: 1.4; }
  .metar { font-family: Consolas, monospace; font-size: 20px; background: var(--panel2); padding: 14px 18px; border-radius: 8px; line-height: 2; }
  .metar-token { cursor: pointer; padding: 3px 6px; border-radius: 6px; border: 1px solid transparent; }
  .metar-token:hover { border-color: var(--gold); }
  .metar-token.sel { background: var(--gold); color: #1a1a1a; font-weight: 700; }
  /* --- diagram animations (respect reduced-motion) --- */
  @keyframes p107bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  @keyframes p107pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  @keyframes p107shim { 0%,100% { opacity: .25; } 50% { opacity: .6; } }
  @keyframes p107ring { 0%,100% { box-shadow: 0 0 0 3px rgba(212,169,66,.30), 0 0 14px rgba(212,169,66,.5); } 50% { box-shadow: 0 0 0 6px rgba(212,169,66,.55), 0 0 28px rgba(212,169,66,.95); } }
  .p107-drone { animation: p107bob 2.6s ease-in-out infinite; }
  .p107-auth { animation: p107pulse 2s ease-in-out infinite; }
  .p107-vig { animation: p107shim 3s ease-in-out infinite; }
  /* --- Chart Detective guided tour --- */
  .tourstage { position: relative; max-width: 660px; margin: 8px auto 12px; border: 2px solid var(--gold-dim); border-radius: 8px; overflow: hidden; line-height: 0; }
  .tourstage img { width: 100%; display: block; }
  .tourhot { position: absolute; border: 3px solid var(--gold); border-radius: 6px; transition: left .5s cubic-bezier(.4,0,.2,1), top .5s cubic-bezier(.4,0,.2,1), width .5s cubic-bezier(.4,0,.2,1), height .5s cubic-bezier(.4,0,.2,1); pointer-events: none; animation: p107ring 1.5s ease-in-out infinite; }
  .tourcap { background: var(--panel2); border-radius: 8px; padding: 12px 16px; font-size: 15px; min-height: 74px; }
  .tourcap .tourstep { color: var(--gold); font-weight: 700; }
  .tourdots { display: flex; gap: 6px; margin: 12px 0 4px; flex-wrap: wrap; align-items: center; }
  .tourdot { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--line); background: var(--panel2); color: var(--dim); cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
  .tourdot.on { background: var(--gold); color: #1a1a1a; font-weight: 700; border-color: var(--gold); }
  /* --- Interactive (pan/zoom + tappable) sectional --- */
  .mapviewport { position: relative; width: 100%; max-width: 980px; margin: 8px auto; border: 2px solid var(--gold-dim); border-radius: 8px; overflow: hidden; background: #000; touch-action: none; cursor: grab; user-select: none; }
  .mapviewport.grabbing { cursor: grabbing; }
  .mapworld { position: absolute; top: 0; left: 0; width: 100%; transform-origin: 0 0; }
  .mapworld img { width: 100%; display: block; pointer-events: none; }
  .maphot { position: absolute; width: 44px; height: 44px; min-height: 44px; padding: 0; margin: -22px 0 0 -22px; border-radius: 50%; border: 2px solid #1a1a1a; background: var(--gold); color: #1a1a1a; font-weight: 800; font-size: 13px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 0 2px rgba(212,169,66,.6); animation: p107ring 1.7s ease-in-out infinite; }
  .maphot.on { background: #fff; border-color: var(--gold); }
  .maphotbox { position: absolute; border: 3px solid #fff; border-radius: 4px; pointer-events: none; box-shadow: 0 0 16px rgba(255,255,255,.85); transition: left .35s, top .35s, width .35s, height .35s; }
  .mapzoom { position: absolute; right: 8px; bottom: 8px; display: flex; gap: 4px; z-index: 5; }
  .mapzoom button { width: 36px; height: 36px; padding: 0; font-size: 18px; line-height: 1; background: rgba(28,30,36,.92); }
  .maphint { position: absolute; left: 8px; top: 8px; right: 52px; background: rgba(28,30,36,.82); color: #cfd6de; font-size: 11px; padding: 5px 9px; border-radius: 6px; z-index: 5; pointer-events: none; }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; } }
  @media (max-width: 980px) { .scenario-shell { grid-template-columns: 1fr; } .scenario-map { position: static; } }
  @media (max-width: 700px) { .barlabel { flex-basis: 150px; } .decodegrid { grid-template-columns: 1fr; } header { padding-inline: 12px; } nav { margin-left: 0; } }
</style>
</head>
<body>
<header>
  <h1><img class="brandmark" src="assets/Part107Prep-icon-32.png" alt="">Part 107 Prep <small>v1.5</small></h1>
  <span class="sub">FAA Remote Pilot Knowledge Test (UAG) · 60 Q · 2 hr · 70% to pass</span>
  <nav>
    <button data-v="home" class="active">Dashboard</button>
    <button data-v="exam">Practice Exam</button>
    <button data-v="study">Study Mode</button>
    <button data-v="drill">Weak-Spot Drill</button>
    <button data-v="charts">Chart School</button>
    <button data-v="scenarios">Scenarios</button>
    <button data-v="gonogo">Go / No-Go</button>
    <button data-v="reference">Reference</button>
    <button data-v="system">System Check</button>
  </nav>
</header>
<main id="main"></main>

<div id="figmodal" role="dialog" aria-modal="true" aria-label="FAA chart figure viewer">
  <div id="figwrap"><img id="figimg" alt="FAA testing supplement figure"></div>
  <button id="figclose">Close (or click outside)</button>
</div>

<script src="qbank_faa.js?v=17"></script>
<script src="qbank_charts.js?v=17"></script>
<script src="qbank_reg.js?v=17"></script>
<script src="qbank_air.js?v=17"></script>
<script src="qbank_wx.js?v=17"></script>
<script src="qbank_load.js?v=17"></script>
<script src="qbank_ops.js?v=17"></script>
<script src="charts.js?v=17"></script>
<script src="scenarios.js?v=17"></script>
<script src="scenarios_v15.js?v=17"></script>
<script src="gonogo.js?v=17"></script>
<script src="app.js?v=17"></script>
</body>
</html>
